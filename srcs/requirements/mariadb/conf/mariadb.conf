[mysqld]
# ==============================================================================
# 1. BASE SYSTEM & PATH CONFIGURATION
# ==============================================================================
user                    = mysql
pid-file                = /var/run/mysqld/mysqld.pid
socket                  = /var/run/mysqld/mysqld.sock
port                    = 3306
basedir                 = /usr
datadir                 = /var/lib/mysql
tmpdir                  = /tmp
lc-messages-dir         = /usr/share/mysql

# ==============================================================================
# 2. NETWORK BOUNDARY & INTER-CONTAINER LINKING
# ==============================================================================
# Listen on all network interfaces to allow incoming connections from WordPress container
bind-address            = 0.0.0.0
# Disable DNS host name lookups for faster connection handshake speeds
skip-name-resolve       = 1

# ==============================================================================
# 3. ROOTLESS LOGGING & PERMISSION HARDENING
# ==============================================================================
# Redirect errors to stderr to prevent write permission failures in /var/log/
log_error               = stderr
syslog                  = 0
general_log             = 0
slow_query_log          = 0

# ==============================================================================
# 4. CHARACTER ENCODING & COLLATIONS
# ==============================================================================
character-set-server    = utf8mb4
collation-server        = utf8mb4_general_ci

# ==============================================================================
# 5. LOCAL CLIENT CONNECTIONS
# ==============================================================================
[client]
port                    = 3306
socket                  = /var/run/mysqld/mysqld.sock

[mysql]
default-character-set   = utf8mb4