[wordpress]

# 1. 物理属权无缝嵌入
user = www-data
group = www-data

# 2. 🎯 端口合龙：完美咬合我们在 Dockerfile 与 nginx.conf 中焊死的非标 9001 天线！
listen = 0.0.0.0:9001

# =========================================================
# 3. DYNAMIC PROCESS MANAGEMENT LOGIC (DEBIAN 12 TUNING)
# =========================================================
pm = dynamic

# 允许派生的最大子进程总数（防范内存逃逸熔断）
pm.max_children = 25

# 👑 优化对齐：冷启动时预先拉起的子进程数
pm.start_servers = 5

# 👑 终极绝杀优化：将最小空闲进程由 1 强行托举抬高至 2！
# 防止进程池在高并发瞬间被瞬间掏空，消除 Linux 内核高频 fork 导致的 CPU 锁死
pm.min_spare_servers = 2

# 最大空闲进程数（收敛闲置内存句柄）
pm.max_spare_servers = 10

# 每个子进程在处理完 500 次请求后强制物理销毁并重建，彻底根除 PHP 的隐性内存泄漏（Memory Leak）
pm.max_requests = 500

# =========================================================
# 4. SECURITY & CONTEXT CLEANING
# =========================================================
# 刚性清洗环境变量，隔离宿主机的越界变量污染，确保沙箱纯净度
clear_env = yes

# 👑 绝对死守：严禁修改此处！仅允许解析标准的 .php 后缀，物理绝杀 Webshell 旁路注入！
security.limit_extensions = .php