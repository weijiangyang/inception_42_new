[wordpress]

user = www-data
group = www-data

listen = 0.0.0.0:9001

# =========================================================
# 3. DYNAMIC PROCESS MANAGEMENT LOGIC (DEBIAN 12 TUNING)
# =========================================================
pm = dynamic

pm.max_children = 25

pm.start_servers = 5

pm.min_spare_servers = 2

pm.max_spare_servers = 10

pm.max_requests = 500

# =========================================================
# 4. SECURITY & CONTEXT CLEANING
# =========================================================
clear_env = yes
security.limit_extensions = .php