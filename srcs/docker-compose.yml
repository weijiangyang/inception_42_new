services:
  mariadb:
    build:
      context: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    env_file:
      - .env
    secrets:
      - db_root_password
      - db_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception_network
    restart: always

  wordpress:
    build:
      context: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    env_file:
      - .env
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_network
    depends_on:
      - mariadb
    restart: always


  
  redis:
    build: ./requirements/bonus/redis
    image: redis
    container_name: redis
    profiles:
      - bonus
    volumes:
      - redis_data:/data
    networks:
      - inception_network
    restart: always

  adminer:
    build:
      context: ./requirements/bonus/adminer
    image: adminer
    container_name: adminer
    profiles:
      - bonus
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_network
    depends_on:
      - mariadb
    restart: always
  
  nginx:
    build:
      context: ./requirements/nginx
    image: nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html:ro
      - resume_data:/var/www/static/resume:ro
    networks:
      - inception_network
    depends_on:
      - wordpress
      
    restart: always

  ftp:
      build:
        context: ./requirements/bonus/ftp
      image: ftp
      container_name: ftp
      profiles:
        - bonus
      env_file:
        - .env
      secrets:
        - ftp_password
      ports:
        - "21:21"
        - "40000-40005:40000-40005"
      volumes:
        - wordpress_data:/var/www/html
      networks:
        - inception_network
      depends_on:
        - wordpress
      restart: always
  monitoring:
    build:
      context: ./requirements/bonus/monitoring
    # 🎯 命名空间硬化：强行覆盖默认前缀，确保镜像名与服务名 100% 绝对指纹共振
    image: monitoring           
    container_name: monitoring
    
    # 🎯 物理有状态持久化：将监控的 SQLite 指纹字典树死死锁在全局 Volume 内部
    volumes:
      - monitoring_data:/app/data
      
    # 🎯 传输层天线映射：非标端口硬化（外部 3001 映射内部 3001），防范公网盲扫
    ports:
      - "3001:3001"
      
    # 🎯 虚拟专网并网：拉入私有局域网网格，赋予其直接动态寻址 nginx/wordpress/mariadb 的神明视角！
    networks:
      - inception_network
      
    # 🎯 极限自愈
    restart: always
 
networks:
  inception_network:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/weiyang/data/mariadb'
  wordpress_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/weiyang/data/wordpress'
  redis_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/weiyang/data/redis'
  resume_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/weiyang/data/resume'
  monitoring_data:              # 👑 刚性宣告：在底层虚拟文件系统（VFS）中开辟全新有状态持久化物理卷
    name: monitoring_data
    

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_password:
    file: ./secrets/db_password.txt
  wp_admin_password:
    file: ./secrets/wp_admin_password.txt
  wp_user_password:
    file: ./secrets/wp_user_password.txt
  ftp_password:
    file: ./secrets/ftp_password.txt